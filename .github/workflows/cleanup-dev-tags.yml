name: Cleanup Dev Tags

on:
  workflow_run:
    workflows: ["Beta Version Management"]
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get merged branch name from commit API
        id: branch
        run: |
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          echo "Commit SHA: $HEAD_SHA"

          # Получаем PR, связанные с этим коммитом (требуется preview-заголовок)
          PRS=$(gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/pulls" \
            -H "Accept: application/vnd.github.groot-preview+json" || echo "[]")

          # Выбираем PR с base.ref == "develop" и merged == true
          PR_NUMBER=$(echo "$PRS" | jq -r '.[] | select(.base.ref == "develop" and .merged == true) | .number' | head -1)

          if [ -z "$PR_NUMBER" ]; then
            echo "No merged PR targeting develop found for this commit, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Получаем полные данные PR
          PR_DATA=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER")
          HEAD_REF=$(echo "$PR_DATA" | jq -r '.head.ref')
          SANITIZED=$(bash ./scripts/sanitize-branch.sh "$HEAD_REF")
          echo "Branch: $HEAD_REF -> sanitized: $SANITIZED"
          echo "sanitized=$SANITIZED" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete dev tags
        if: steps.branch.outputs.skip != 'true'
        run: |
          SANITIZED="${{ steps.branch.outputs.sanitized }}"
          PKGS=$(bash scripts/list-packages.sh)
          for pkg in $PKGS; do
            echo "Cleaning dev tags for $pkg with branch pattern $SANITIZED"
            bash scripts/cleanup-tags.sh "$pkg" dev "$SANITIZED"
          done
