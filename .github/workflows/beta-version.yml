name: Beta Version Management

on:
  push:
    branches: [develop]

jobs:
  detect:
    name: Detect Changed Packages
    uses: ./.github/workflows/detect-changed-packages.yml
    with:
      base-ref: ${{ github.event.before }}
      head-ref: ${{ github.sha }}
      fallback-branch: develop

  create-beta:
    name: Create Beta Version
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Compute next base version
        id: base_version
        run: |
          PKG="${{ matrix.package }}"
          NEXT_BASE=$(bash ./scripts/next-version.sh "$PKG")
          echo "next_base=$NEXT_BASE" >> $GITHUB_OUTPUT
          echo "Next base version for $PKG: $NEXT_BASE"

      - name: Determine beta build number
        id: beta
        run: |
          PKG="${{ matrix.package }}"
          BASE="${{ steps.base_version.outputs.next_base }}"

          # Ищем последний beta-тег с точно такой же базовой версией
          LAST_BETA=$(git tag -l "${PKG}/v${BASE}-beta.*" | sort -V | tail -n1)

          if [ -z "$LAST_BETA" ]; then
            BUILD=1
          else
            LAST_BUILD=$(echo "$LAST_BETA" | grep -oE '[0-9]+$' || echo "0")
            BUILD=$((LAST_BUILD + 1))
          fi

          echo "build=$BUILD" >> $GITHUB_OUTPUT
          echo "beta_version=${BASE}-beta.${BUILD}" >> $GITHUB_OUTPUT
          echo "Will create beta tag: ${PKG}/v${BASE}-beta.${BUILD}"

      - name: Create beta tag and update deps
        run: |
          PKG="${{ matrix.package }}"
          VERSION="${{ steps.beta.outputs.beta_version }}"
          TAG="${PKG}/v${VERSION}"

          echo "Creating beta tag: $TAG"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Beta version for $PKG"
          git push origin "$TAG"

          # Обновляем внутренние зависимости
          bash ./scripts/update-internal-deps.sh "$PKG" "v$VERSION"
          git push origin develop

      - name: Delete dev tags for this package
        if: always() && steps.beta.outputs.beta_version != ''
        run: |
          PKG="${{ matrix.package }}"
          echo "Deleting all dev tags for $PKG"
          DEV_TAGS=$(git tag -l "${PKG}/v*-dev-*")
          for tag in $DEV_TAGS; do
            git push origin ":refs/tags/$tag" || true
          done
