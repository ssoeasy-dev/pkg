name: Cleanup Dev Tags

on:
  workflow_run:
    workflows: ["Beta Version Management"]
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find merged PR for commit
        id: pr
        run: |
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          echo "Commit SHA: $HEAD_SHA"

          # Ищем закрытые PR с base=develop, у которых merge_commit_sha совпадает с HEAD_SHA
          PR_JSON=$(gh api "repos/${{ github.repository }}/pulls" \
            -f state=closed \
            -f base=develop \
            -f per_page=100 \
            --paginate \
            --jq '.[] | select(.merge_commit_sha == "'"$HEAD_SHA"'")')

          if [ -z "$PR_JSON" ]; then
            echo "No merged PR found with merge_commit_sha = $HEAD_SHA, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Берём первый (должен быть один)
          PR_NUMBER=$(echo "$PR_JSON" | jq -r '.number')
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref')
          SANITIZED=$(bash ./scripts/sanitize-branch.sh "$HEAD_REF")
          echo "Found PR #$PR_NUMBER from branch $HEAD_REF"
          echo "sanitized=$SANITIZED" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Delete dev tags
        if: steps.pr.outputs.skip != 'true'
        run: |
          SANITIZED="${{ steps.pr.outputs.sanitized }}"
          PKGS=$(bash scripts/list-packages.sh)
          for pkg in $PKGS; do
            echo "Cleaning dev tags for $pkg with branch pattern $SANITIZED"
            bash scripts/cleanup-tags.sh "$pkg" dev "$SANITIZED"
          done
