name: Dev Version Management

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop]

jobs:
  detect:
    name: Detect Changed Packages
    uses: ./.github/workflows/detect-changed-packages.yml
    with:
      base-ref: origin/develop
      head-ref: ${{ github.event.pull_request.head.sha }}

  create-pseudo:
    name: Generate Pseudo-version
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Generate pseudo-version
        id: pseudo
        run: |
          PKG="${{ matrix.package }}"
          COMMIT=$(git log -1 --format="%H" -- "${PKG}/")
          TIMESTAMP=$(git show -s --format="%ct" "$COMMIT")
          ABBREV=$(echo "$COMMIT" | cut -c1-12)
          PSEUDO="v0.0.0-$(date -u -d "@$TIMESTAMP" +"%Y%m%d%H%M%S")-$ABBREV"

          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          echo "pseudo=$PSEUDO" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const pkg = '${{ matrix.package }}';
            const pseudo = '${{ steps.pseudo.outputs.pseudo }}';
            const commit = '${{ steps.pseudo.outputs.commit }}'.substring(0, 7);

            const body = `## 📦 Dev version for \`${pkg}\`

            **Pseudo-version:** \`${pseudo}\`

            **Usage in Go:**
            \`\`\`bash
            go get github.com/${{ github.repository }}/${pkg}@${pseudo}
            \`\`\`

            **In go.mod:**
            \`\`\`
            require github.com/${{ github.repository }}/${pkg} ${pseudo}
            \`\`\`

            **Commit:** \`${commit}\`

            > ℹ️ This is a [pseudo-version](https://go.dev/ref/mod#pseudo-versions) tied to the latest commit touching \`${pkg}\`. It will remain valid permanently.
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const marker = `Dev version for \`${pkg}\``;
            const botComment = comments.find(c => c.user.type === 'Bot' && c.body.includes(marker));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body
              });
            }
