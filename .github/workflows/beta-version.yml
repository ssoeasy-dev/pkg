name: Beta Version Management

on:
  push:
    branches: [develop]

jobs:
  detect:
    name: Detect Changed Packages
    uses: ./.github/workflows/detect-changed-packages.yml
    with:
      base-ref: ${{ github.event.before }}
      head-ref: ${{ github.sha }}

  create-beta:
    name: Create Beta Version
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Find maximum base version from dev tags
        id: max_dev
        run: |
          PKG="${{ matrix.package }}"
          # Все dev-теги пакета
          DEV_TAGS=$(git tag -l "${PKG}/v*-dev-*")
          MAX_BASE="0.0.0"
          for tag in $DEV_TAGS; do
            # Извлекаем базовую версию (до -dev-)
            base=$(echo "$tag" | sed -E "s|^${PKG}/v([0-9]+\.[0-9]+\.[0-9]+)-dev-.*|\1|")
            if [ -n "$base" ] && [ "$(printf '%s\n' "$MAX_BASE" "$base" | sort -V | tail -n1)" = "$base" ]; then
              MAX_BASE="$base"
            fi
          done
          echo "max_base=$MAX_BASE" >> $GITHUB_OUTPUT

      - name: Compare with last beta
        id: beta
        run: |
          PKG="${{ matrix.package }}"
          MAX_BASE="${{ steps.max_dev.outputs.max_base }}"

          # Последний beta-тег пакета
          LAST_BETA=$(git tag -l "${PKG}/v*-beta.*" | sort -V | tail -n1)
          if [ -z "$LAST_BETA" ]; then
            LAST_BETA_BASE="0.0.0"
            LAST_BUILD=0
          else
            LAST_BETA_BASE=$(echo "$LAST_BETA" | sed -E "s|^${PKG}/v([0-9]+\.[0-9]+\.[0-9]+)-beta\.[0-9]+|\1|")
            LAST_BUILD=$(echo "$LAST_BETA" | grep -oE '[0-9]+$' || echo "0")
          fi

          # Сравниваем базовые версии
          if [ "$(printf '%s\n' "$LAST_BETA_BASE" "$MAX_BASE" | sort -V | tail -n1)" = "$MAX_BASE" ] && [ "$MAX_BASE" != "$LAST_BETA_BASE" ]; then
            # Новая мажорная/минорная/патч-версия
            if [ "$MAX_BASE" = "$LAST_BETA_BASE" ]; then
              BUILD=$((LAST_BUILD + 1))
            else
              BUILD=1
            fi
            echo "should_create=true" >> $GITHUB_OUTPUT
            echo "beta_version=${MAX_BASE}-beta.${BUILD}" >> $GITHUB_OUTPUT
          else
            echo "should_create=false" >> $GITHUB_OUTPUT
          fi

      - name: Create beta tag and update deps
        if: steps.beta.outputs.should_create == 'true'
        run: |
          PKG="${{ matrix.package }}"
          VERSION="${{ steps.beta.outputs.beta_version }}"
          TAG="${PKG}/v${VERSION}"

          echo "Creating beta tag: $TAG"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Beta version for $PKG"
          git push origin "$TAG"

          # Обновляем внутренние зависимости
          bash ./scripts/update-internal-deps.sh "$PKG" "v$VERSION"
          git push origin develop

      - name: Delete dev tags for this package
        if: steps.beta.outputs.should_create == 'true'
        run: |
          PKG="${{ matrix.package }}"
          echo "Deleting all dev tags for $PKG"
          DEV_TAGS=$(git tag -l "${PKG}/v*-dev-*")
          for tag in $DEV_TAGS; do
            git push origin ":refs/tags/$tag" || true
          done
