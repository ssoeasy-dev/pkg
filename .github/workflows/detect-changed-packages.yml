# .github/workflows/detect-changed-packages.yml
name: Detect Changed Packages

on:
  workflow_call:
    inputs:
      base-ref:
        required: true
        type: string
        description: "Base ref to compare against (e.g., origin/develop)"
      head-ref:
        required: true
        type: string
        description: "Head ref to compare (e.g., github.sha)"
    outputs:
      packages:
        description: "JSON array of changed package names"
        value: ${{ jobs.detect.outputs.packages }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.changed.outputs.packages }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: changed
        run: |
          PACKAGES=("db" "logger" "grpc" "rmq" "s3" "errors")
          CHANGED=()

          # Ensure base ref is available
          git fetch origin ${{ inputs.base-ref }} --depth=1 || true

          for pkg in "${PACKAGES[@]}"; do
            if git diff --name-only ${{ inputs.base-ref }}..${{ inputs.head-ref }} | grep -q "^${pkg}/"; then
              CHANGED+=("$pkg")
            fi
          done

          if [ ${#CHANGED[@]} -eq 0 ]; then
            JSON="[]"
          else
            JSON=$(printf '%s\n' "${CHANGED[@]}" | jq -R . | jq -s -c .)
          fi

          echo "Changed packages: $JSON"
          echo "packages=$JSON" >> $GITHUB_OUTPUT
