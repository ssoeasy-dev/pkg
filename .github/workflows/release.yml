name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: read
  actions: read # для чтения статусов workflow-запусков

jobs:
  # ─── 1. Определяем изменённые пакеты ────────────────────────────────────────
  detect-changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.detect.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed packages
        id: detect
        run: |
          PACKAGES=("db" "logger" "grpc" "rmq" "s3" "errors")
          ALL_PACKAGES=$(printf '%s\n' "${PACKAGES[@]}" | jq -R . | jq -s -c .)

          if [ -z "${{ github.event.before }}" ] || \
             ! git rev-parse "${{ github.event.before }}" >/dev/null 2>&1; then
            echo "No previous commit — releasing all packages"
            echo "matrix={\"package\":${ALL_PACKAGES}}" >> $GITHUB_OUTPUT
            exit 0
          fi

          CHANGED="[]"
          BASE="${{ github.event.before }}"
          HEAD="${{ github.sha }}"

          for pkg in "${PACKAGES[@]}"; do
            if git diff --name-only "$BASE" "$HEAD" | grep -q "^${pkg}/"; then
              CHANGED=$(echo "$CHANGED" | jq -c ". + [\"${pkg}\"]")
            fi
          done

          echo "Changed packages: $CHANGED"
          echo "matrix={\"package\":$CHANGED}" >> $GITHUB_OUTPUT

  # ─── 2. Ожидаем завершения Lint и Test ────────────────────────────────────
  wait-for-checks:
    name: Wait for Lint & Test
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Wait for Lint & Test, then check results
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const REQUIRED = ['Lint', 'Test'];
            const POLL_INTERVAL_MS = 15000; // 15 секунд
            const TIMEOUT_MS = 10 * 60 * 1000; // 10 минут максимум ожидания
            const started = Date.now();

            console.log(`SHA: ${sha}`);

            while (true) {
              const { data: { workflow_runs: runs } } =
                await github.rest.actions.listWorkflowRunsForRepo({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  head_sha: sha,
                  per_page: 20,
                });

              const relevant = runs.filter(r => REQUIRED.includes(r.name));
              console.log('Runs:', relevant.map(r => `${r.name}=${r.conclusion ?? 'running'}`));

              // Нет запусков Lint/Test — прямой пуш без PR, деплоим сразу
              if (relevant.length === 0) {
                console.log('No Lint/Test runs found — direct push, deploying.');
                core.setOutput('should_deploy', 'true');
                return;
              }

              const stillRunning = relevant.filter(r => r.conclusion === null);

              if (stillRunning.length === 0) {
                // Все завершились — проверяем результаты
                const failed = relevant.filter(r => r.conclusion !== 'success');
                if (failed.length > 0) {
                  core.warning(`Checks failed: ${failed.map(r => `${r.name}=${r.conclusion}`).join(', ')}`);
                  core.setOutput('should_deploy', 'false');
                } else {
                  console.log('All checks passed — deploying.');
                  core.setOutput('should_deploy', 'true');
                }
                return;
              }

              // Есть ещё бегущие — проверяем таймаут
              if (Date.now() - started > TIMEOUT_MS) {
                core.setFailed(`Timeout waiting for: ${stillRunning.map(r => r.name).join(', ')}`);
                return;
              }

              console.log(`Still running: ${stillRunning.map(r => r.name).join(', ')}. Waiting ${POLL_INTERVAL_MS / 1000}s...`);
              await new Promise(r => setTimeout(r, POLL_INTERVAL_MS));
            }

  # ─── 3. Релизим каждый изменённый пакет (только если проверки прошли) ──────
  release:
    name: Release ${{ matrix.package }}
    needs:
      - detect-changes
      - wait-for-checks
    if: |
      needs.detect-changes.outputs.matrix != '{"package":[]}' &&
      needs.wait-for-checks.outputs.should_deploy == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.package }}/go.mod

      - name: Configure Go for private modules
        run: |
          git config --global \
            url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf \
            "https://github.com/"
          go env -w GOPRIVATE=github.com/ssoeasy-dev/*

      # ── Определяем следующую версию, анализируя маркеры ────────────────────
      - name: Calculate next version
        id: version
        run: |
          PKG="${{ matrix.package }}"

          # Ищем последний тег вида <pkg>/vX.Y.Z
          LAST_TAG=$(git tag -l "${PKG}/v*" \
            | sort -V \
            | tail -n 1)

          if [ -z "$LAST_TAG" ]; then
            echo "No existing tags for package ${PKG}"
          fi

          # Получаем коммиты, затронувшие пакет
          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          COMMITS=$(git log "$RANGE" \
            --format="%s" \
            -- "${PKG}/" \
            2>/dev/null || true)

          echo "Commits since ${LAST_TAG:-beginning}:"
          echo "$COMMITS"

          # Анализ маркеров
          skip=false
          has_major=false
          has_minor=false
          has_patch=false

          while IFS= read -r msg; do
            [ -z "$msg" ] && continue
            if echo "$msg" | grep -q "major(${PKG})"; then
              has_major=true
              echo "Found major marker in: $msg"
            elif echo "$msg" | grep -qE "(feat|minor)\(${PKG}\)"; then
              has_minor=true
              echo "Found minor marker in: $msg"
            elif echo "$msg" | grep -q "(${PKG})"; then
              has_patch=true
              echo "Found patch marker in: $msg"
            fi
          done <<< "$COMMITS"

          # Определяем тип бампа
          if [ "$has_major" = true ]; then
            BUMP_TYPE="major"
          elif [ "$has_minor" = true ]; then
            BUMP_TYPE="minor"
          elif [ "$has_patch" = true ]; then
            BUMP_TYPE="patch"
          else
            echo "No release markers found for package ${PKG} in commits. Skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Вычисляем следующую версию
          if [ -z "$LAST_TAG" ]; then
            NEXT="v1.0.0"
            echo "First release for ${PKG} → ${NEXT}"
          else
            VERSION="${LAST_TAG#${PKG}/v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)

            case $BUMP_TYPE in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac

            NEXT="v${MAJOR}.${MINOR}.${PATCH}"
            echo "Bump type: $BUMP_TYPE — $LAST_TAG → ${PKG}/${NEXT}"
          fi

          echo "version=${NEXT}" >> $GITHUB_OUTPUT
          echo "tag=${PKG}/${NEXT}" >> $GITHUB_OUTPUT
          echo "last_tag=${LAST_TAG}" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

      # ── Проверяем, что тег ещё не существует ────────────────────────────────
      - name: Check tag doesn't exist
        if: steps.version.outputs.skip != 'true'
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if git tag -l "$TAG" | grep -q "$TAG"; then
            echo "⚠️ Tag $TAG already exists — skipping release"
            exit 1
          fi
          echo "✅ Tag $TAG is free"

      # ── Прогоняем тесты перед релизом ────────────────────────────────────────
      - name: Run tests
        if: steps.version.outputs.skip != 'true'
        working-directory: ${{ matrix.package }}
        run: |
          go mod download
          go test -v -race ./...

      # ── Собираем changelog ───────────────────────────────────────────────────
      - name: Build changelog
        if: steps.version.outputs.skip != 'true'
        id: changelog
        run: |
          PKG="${{ matrix.package }}"
          LAST_TAG="${{ steps.version.outputs.last_tag }}"

          if [ -z "$LAST_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${LAST_TAG}..HEAD"
          fi

          CHANGES=$(git log "$RANGE" \
            --format="- %s ([%h](https://github.com/${{ github.repository }}/commit/%H))" \
            -- "${PKG}/" \
            2>/dev/null || true)

          if [ -z "$CHANGES" ]; then
            CHANGES="- Minor changes and improvements"
          fi

          {
            echo "notes<<NOTES_EOF"
            echo "## What's Changed"
            echo ""
            echo "$CHANGES"
            echo ""
            echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/${LAST_TAG}...${{ steps.version.outputs.tag }}"
            echo "NOTES_EOF"
          } >> $GITHUB_OUTPUT

      # ── Создаём тег ──────────────────────────────────────────────────────────
      - name: Create git tag
        if: steps.version.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TAG="${{ steps.version.outputs.tag }}"
          git tag -a "$TAG" -m "Release ${TAG}"
          git push origin "$TAG"
          echo "✅ Tag $TAG created and pushed"

      # ── Создаём GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "${{ matrix.package }} ${{ steps.version.outputs.version }}"
          body: ${{ steps.changelog.outputs.notes }}
          draft: false
          prerelease: false

      # ── Выводим инструкцию по использованию ─────────────────────────────────
      - name: Print usage
        if: steps.version.outputs.skip != 'true'
        run: |
          PKG="${{ matrix.package }}"
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          echo ""
          echo "✅ Released: ${TAG}"
          echo ""
          echo "📦 To use in your service:"
          echo "   go get github.com/${{ github.repository }}/${PKG}@${VERSION}"
