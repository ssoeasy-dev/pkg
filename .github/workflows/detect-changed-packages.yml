name: Detect Changed Packages

on:
  workflow_call:
    inputs:
      base-ref:
        required: true
        type: string
      head-ref:
        required: true
        type: string
      fallback-branch:
        required: false
        type: string
        default: "develop"
    outputs:
      packages:
        value: ${{ jobs.detect.outputs.packages }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.changed.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine base commit
        id: base
        run: |
          BASE="${{ inputs.base-ref }}"
          HEAD="${{ inputs.head-ref }}"
          FALLBACK="${{ inputs.fallback-branch }}"
          if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ] || [ "$BASE" = "$HEAD" ]; then
            git fetch origin "$FALLBACK" --depth=1 || true
            BASE=$(git merge-base "origin/$FALLBACK" "$HEAD" 2>/dev/null || echo "origin/$FALLBACK")
          fi
          echo "base=$BASE" >> $GITHUB_OUTPUT

      - name: List all packages
        id: list
        run: |
          ALL_PKGS=$(bash scripts/list-packages.sh --json)
          echo "all=$ALL_PKGS" >> $GITHUB_OUTPUT

      - name: Detect changed packages
        id: changed
        run: |
          ALL_PKGS='${{ steps.list.outputs.all }}'
          BASE="${{ steps.base.outputs.base }}"
          HEAD="${{ inputs.head-ref }}"

          CHANGED=()
          for pkg in $(echo "$ALL_PKGS" | jq -r '.[]'); do
            if git diff --name-only "$BASE" "$HEAD" | grep -q "^${pkg}/"; then
              CHANGED+=("$pkg")
            fi
          done

          if [ ${#CHANGED[@]} -eq 0 ]; then
            JSON="[]"
          else
            JSON=$(printf '%s\n' "${CHANGED[@]}" | jq -R . | jq -s -c .)
          fi
          echo "packages=$JSON" >> $GITHUB_OUTPUT
