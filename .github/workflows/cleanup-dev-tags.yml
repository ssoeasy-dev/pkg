name: Cleanup Dev Tags

on:
  workflow_run:
    workflows: ["Beta Version Management"]
    types:
      - completed

jobs:
  cleanup:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get merged branch name
        id: branch
        run: |
          # Получаем информацию о pull request, который вызвал workflow
          PR_NUMBER=$(echo '${{ toJson(github.event.workflow_run.pull_requests) }}' | jq -r '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR associated with this workflow run, skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Получаем данные PR через GitHub API
          PR_DATA=$(gh api "repos/${{ github.repository }}/pulls/$PR_NUMBER")
          HEAD_REF=$(echo "$PR_DATA" | jq -r '.head.ref')
          MERGED=$(echo "$PR_DATA" | jq -r '.merged')

          if [ "$MERGED" != "true" ]; then
            echo "PR #$PR_NUMBER was not merged, skipping dev tag cleanup."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          SANITIZED=$(bash ./scripts/sanitize-branch.sh "$HEAD_REF")
          echo "Branch: $HEAD_REF -> sanitized: $SANITIZED"
          echo "sanitized=$SANITIZED" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get changed packages from workflow run
        id: packages
        if: steps.branch.outputs.skip != 'true'
        run: |
          # Скачиваем артефакты workflow beta-version (если они есть)
          # Альтернативно можно получить список изменённых пакетов из базы workflow
          # Но проще повторно определить изменённые пакеты относительно базы
          # Для этого используем git diff между базой мержа и HEAD (раз уж мы в checkout)
          # Но мы не знаем base sha. Проще всего — удалить все dev-теги для этой ветки
          # во всех пакетах, которые есть в репозитории. Это безопасно.
          PKGS=$(bash scripts/list-packages.sh --json)
          echo "packages=$PKGS" >> $GITHUB_OUTPUT

      - name: Delete dev tags
        if: steps.branch.outputs.skip != 'true'
        run: |
          SANITIZED="${{ steps.branch.outputs.sanitized }}"
          PKGS='${{ steps.packages.outputs.packages }}'
          for pkg in $(echo "$PKGS" | jq -r '.[]'); do
            echo "Cleaning dev tags for $pkg with branch pattern $SANITIZED"
            bash scripts/cleanup-tags.sh "$pkg" dev "$SANITIZED"
          done
