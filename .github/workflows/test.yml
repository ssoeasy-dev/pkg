name: Test

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read
  packages: read

jobs:
  detect:
    name: Detect changed packages
    uses: ./.github/workflows/detect-changed-packages.yml
    with:
      base-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
      head-ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.event.after || github.sha }}
      fallback-branch: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}

  test:
    needs: detect
    if: needs.detect.outputs.packages != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: ${{ fromJson(needs.detect.outputs.packages) }}
        go-version: [1.24.1]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go-version }}

      - name: Configure git for private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Configure Go for private modules
        run: |
          go env -w GOPRIVATE=github.com/ssoeasy-dev/*
          go env -w GONOPROXY=github.com/ssoeasy-dev/*
          go env -w GONOSUMDB=github.com/ssoeasy-dev/*

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Download dependencies
        working-directory: ${{ matrix.package }}
        run: go mod download

      - name: Run tests
        working-directory: ${{ matrix.package }}
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.out
          fail_ci_if_error: false
