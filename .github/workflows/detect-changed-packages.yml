name: Detect Changed Packages

on:
  workflow_call:
    inputs:
      base-ref:
        required: true
        type: string
      head-ref:
        required: true
        type: string
    outputs:
      packages:
        value: ${{ jobs.detect.outputs.packages }}

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.changed.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changed packages
        id: changed
        run: |
          PACKAGES=("db" "logger" "grpc" "rmq" "s3" "errors")
          CHANGED=()
          git fetch origin ${{ inputs.base-ref }} --depth=1 || true
          for pkg in "${PACKAGES[@]}"; do
            if git diff --name-only ${{ inputs.base-ref }}..${{ inputs.head-ref }} | grep -q "^${pkg}/"; then
              CHANGED+=("$pkg")
            fi
          done
          if [ ${#CHANGED[@]} -eq 0 ]; then
            JSON="[]"
          else
            JSON=$(printf '%s\n' "${CHANGED[@]}" | jq -R . | jq -s -c .)
          fi
          echo "packages=$JSON" >> $GITHUB_OUTPUT
